name: Run Stepenin Bot

on:
  # Запуск вручную через GitHub UI
  workflow_dispatch:
    inputs:
      start_url:
        description: 'Ссылка на первый вопрос (например, https://stepenin.ru/tasks/common/test2042/26)'
        required: false
        default: ''
      max_questions:
        description: 'Максимальный номер вопроса (оставьте пустым для всех)'
        required: false
        default: ''
  
  # Запуск через создание Issue
  issues:
    types: [opened]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Setup Chrome
      uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: stable
    
    - name: Setup ChromeDriver
      uses: nanasess/setup-chromedriver@v2
    
    - name: Parse Issue Command (if triggered by issue)
      id: parse_issue
      if: github.event_name == 'issues'
      run: |
        ISSUE_BODY=$(jq -r '.issue.body' $GITHUB_EVENT_PATH)
        ISSUE_TITLE=$(jq -r '.issue.title' $GITHUB_EVENT_PATH)
        
        # Парсим команду из заголовка или тела
        # Формат: "run test2042" или "run https://stepenin.ru/..."
        if [[ "$ISSUE_TITLE" =~ run[[:space:]]+(.*) ]]; then
          PARAM="${BASH_REMATCH[1]}"
        elif [[ "$ISSUE_BODY" =~ run[[:space:]]+(.*) ]]; then
          PARAM="${BASH_REMATCH[1]}"
        else
          PARAM=""
        fi
        
        # Определяем URL
        if [[ "$PARAM" =~ ^https?:// ]]; then
          START_URL="$PARAM"
        elif [[ -n "$PARAM" ]]; then
          # Если просто число - используем стандартный URL с этим тестом
          START_URL="https://stepenin.ru/tasks/common/test${PARAM}/26"
        else
          START_URL="https://stepenin.ru/tasks/common/test2042/26"
        fi
        
        echo "start_url=$START_URL" >> $GITHUB_OUTPUT
        echo "Parsed URL: $START_URL"
    
    - name: Run Stepenin Bot
      env:
        START_URL: ${{ steps.parse_issue.outputs.start_url || github.event.inputs.start_url || '' }}
        MAX_QUESTIONS: ${{ github.event.inputs.max_questions || '' }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        PHONE: ${{ secrets.STEPENIN_PHONE }}
      run: |
        python bot.py
    
    - name: Comment on Issue (if triggered by issue)
      if: github.event_name == 'issues'
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const issueNumber = context.issue.number;
          
          const comment = `### ✅ Бот запущен\n\nОтветы отправлены в Telegram!\n\n_Проверьте сообщения от вашего бота._`;
          
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: issueNumber,
            body: comment
          });
